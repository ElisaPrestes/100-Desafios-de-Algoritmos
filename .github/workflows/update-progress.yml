name: Atualizar Progresso

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Contar arquivos de desafios
        id: count
        run: |
          JAVA_COUNT=$(find Java -name "*.java" -type f 2>/dev/null | wc -l | tr -d ' ')
          PY_COUNT=$(find Python -name "*.py" -type f 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$((JAVA_COUNT + PY_COUNT))
          if [ "$TOTAL" -gt 100 ]; then TOTAL=100; fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "java=$JAVA_COUNT" >> $GITHUB_OUTPUT
          echo "python=$PY_COUNT" >> $GITHUB_OUTPUT
          echo "📊 Java: $JAVA_COUNT | Python: $PY_COUNT | Total: $TOTAL"

      - name: Gerar progress.svg
        env:
          TOTAL:  ${{ steps.count.outputs.total }}
          JAVA:   ${{ steps.count.outputs.java }}
          PYTHON: ${{ steps.count.outputs.python }}
        run: |
          python3 - << 'PYEOF'
          import os

          total  = int(os.environ.get("TOTAL",  "0"))
          java   = int(os.environ.get("JAVA",   "0"))
          python = int(os.environ.get("PYTHON", "0"))

          TRACK_W = 608
          TRACK_X = 16
          filled_w = max(0, min(TRACK_W, round(TRACK_W * total / 100)))
          pct_x    = TRACK_X + TRACK_W // 2
          mark25   = TRACK_X + round(TRACK_W * 0.25)
          mark50   = TRACK_X + round(TRACK_W * 0.50)
          mark75   = TRACK_X + round(TRACK_W * 0.75)

          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="640" height="80" viewBox="0 0 640 80">
            <defs>
              <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   style="stop-color:#1d4ed8;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
              </linearGradient>
              <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%"   style="stop-color:#1e293b;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
              </linearGradient>
              <clipPath id="barClip">
                <rect x="{TRACK_X}" y="38" width="{TRACK_W}" height="22" rx="11"/>
              </clipPath>
            </defs>
            <rect width="640" height="80" rx="12" fill="url(#bgGrad)"/>
            <text x="16" y="28" font-family="Courier New, monospace" font-size="12" fill="#94a3b8" letter-spacing="2">PROGRESSO</text>
            <text x="624" y="28" font-family="Courier New, monospace" font-size="13" fill="#38bdf8" text-anchor="end" font-weight="bold">{total} / 100</text>
            <rect x="{TRACK_X}" y="38" width="{TRACK_W}" height="22" rx="11" fill="#1e3a5f" opacity="0.8"/>
            <rect x="{TRACK_X}" y="38" width="{filled_w}" height="22" rx="11" fill="url(#barGrad)" clip-path="url(#barClip)"/>
            <rect x="{TRACK_X}" y="38" width="{filled_w}" height="10" rx="5" fill="white" opacity="0.12" clip-path="url(#barClip)"/>
            <line x1="{mark25}" y1="38" x2="{mark25}" y2="60" stroke="#0f172a" stroke-width="1.5" opacity="0.6"/>
            <line x1="{mark50}" y1="38" x2="{mark50}" y2="60" stroke="#0f172a" stroke-width="1.5" opacity="0.6"/>
            <line x1="{mark75}" y1="38" x2="{mark75}" y2="60" stroke="#0f172a" stroke-width="1.5" opacity="0.6"/>
            <text x="{pct_x}" y="53" font-family="Courier New, monospace" font-size="11" fill="#cbd5e1" text-anchor="middle" font-weight="bold">{total}%</text>
          </svg>"""

          with open("progress.svg", "w", encoding="utf-8") as f:
              f.write(svg)
          print(f"progress.svg: {total}/100")
          PYEOF

      - name: Atualizar badges no README
        env:
          TOTAL:  ${{ steps.count.outputs.total }}
          JAVA:   ${{ steps.count.outputs.java }}
          PYTHON: ${{ steps.count.outputs.python }}
        run: |
          python3 - << 'PYEOF'
          import re, os

          total  = os.environ["TOTAL"]
          java   = os.environ["JAVA"]
          python = os.environ["PYTHON"]

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_block = (
              "<!-- PROGRESS_START — não edite este bloco, o GitHub Actions atualiza automaticamente -->\n"
              "<div align=\"center\">\n\n"
              "![Progresso](./progress.svg)\n\n"
              f"![badge](https://img.shields.io/badge/Desafios%20Conclu%C3%ADdos-{total}%20%2F%20100-1d4ed8?style=for-the-badge&logo=checkmarx&logoColor=white)\n"
              "&nbsp;\n"
              f"![Java](https://img.shields.io/badge/Java-{java}%20arquivos-ED8B00?style=for-the-badge&logo=openjdk&logoColor=white)\n"
              "&nbsp;\n"
              f"![Python](https://img.shields.io/badge/Python-{python}%20arquivos-3776AB?style=for-the-badge&logo=python&logoColor=white)\n\n"
              "</div>\n"
              "<!-- PROGRESS_END -->"
          )

          updated = re.sub(
              r"<!-- PROGRESS_START.*?<!-- PROGRESS_END -->",
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)
          print(f"README: {total}/100 (Java: {java}, Python: {python})")
          PYEOF

      - name: Commit das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md progress.svg
          git diff --staged --quiet || git commit -m "chore: atualiza progresso para ${{ steps.count.outputs.total }}/100 desafios [skip ci]"
          git push
