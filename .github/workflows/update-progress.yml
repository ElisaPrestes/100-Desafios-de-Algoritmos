name: Atualizar Progresso

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Contar arquivos de desafios
        id: count
        run: |
          JAVA_COUNT=$(find Java -name "*.java" -type f 2>/dev/null | wc -l | tr -d ' ')
          PY_COUNT=$(find Python -name "*.py" -type f 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$((JAVA_COUNT + PY_COUNT))
          if [ "$TOTAL" -gt 100 ]; then TOTAL=100; fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "java=$JAVA_COUNT" >> $GITHUB_OUTPUT
          echo "python=$PY_COUNT" >> $GITHUB_OUTPUT
          echo "📊 Java: $JAVA_COUNT | Python: $PY_COUNT | Total: $TOTAL"

      - name: Gerar progress.svg
        env:
          TOTAL:  ${{ steps.count.outputs.total }}
          JAVA:   ${{ steps.count.outputs.java }}
          PYTHON: ${{ steps.count.outputs.python }}
        run: |
          python3 - << 'PYEOF'
          import os

          total = int(os.environ.get("TOTAL", "0"))

          # barra: trilho x=22, largura máxima=636, altura=12
          filled = max(0, min(636, round(636 * total / 100)))
          # camadas da barra (efeito pixel degradê)
          f1 = filled
          f2 = max(0, filled // 2)
          f3 = max(0, filled // 4)
          # ponta highlight (4px antes do fim, só se tiver espaço)
          tip_x = 22 + filled - 4 if filled >= 8 else 22

          svg = f"""<svg width="100%" viewBox="0 0 680 90" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Progresso {total}/100 desafios</title>
  <desc>Pixel art barra de progresso — céu estrelado noturno</desc>
  <defs>
    <style>
      .label {{ font-family: 'Courier New', monospace; font-size: 10px; fill: #9d8ec7; letter-spacing: 3px; }}
      .count {{ font-family: 'Courier New', monospace; font-size: 11px; fill: #e0d0ff; font-weight: bold; letter-spacing: 1px; }}
      .pct   {{ font-family: 'Courier New', monospace; font-size: 9px;  fill: #b09ee0; }}
    </style>
  </defs>
  <rect width="680" height="90" fill="#08060f"/>
  <rect width="680" height="90" fill="#0d0a1a"/>
  <rect x="0"   y="0"  width="680" height="4"  fill="#1e1535"/>
  <rect x="0"   y="86" width="680" height="4"  fill="#1e1535"/>
  <rect x="0"   y="0"  width="4"   height="90" fill="#1e1535"/>
  <rect x="676" y="0"  width="4"   height="90" fill="#1e1535"/>
  <rect x="4"   y="4"  width="4"  height="4"  fill="#1e1535"/>
  <rect x="672" y="4"  width="4"  height="4"  fill="#1e1535"/>
  <rect x="4"   y="82" width="4"  height="4"  fill="#1e1535"/>
  <rect x="672" y="82" width="4"  height="4"  fill="#1e1535"/>
  <rect x="40"  y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="200" y="16" width="4" height="4" fill="#e8d8ff"/>
  <rect x="380" y="8"  width="4" height="4" fill="#ffffff"/>
  <rect x="540" y="18" width="4" height="4" fill="#d8eeff"/>
  <rect x="628" y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="130" y="26" width="4" height="4" fill="#ffe8d8"/>
  <rect x="460" y="14" width="4" height="4" fill="#e8d8ff"/>
  <rect x="70"  y="20" width="2" height="2" fill="#c8b8e8"/>
  <rect x="110" y="8"  width="2" height="2" fill="#ffffff" opacity="0.9"/>
  <rect x="155" y="32" width="2" height="2" fill="#b8d8ff"/>
  <rect x="240" y="10" width="2" height="2" fill="#ffffff"/>
  <rect x="280" y="28" width="2" height="2" fill="#d8c8ff"/>
  <rect x="320" y="14" width="2" height="2" fill="#ffffff" opacity="0.8"/>
  <rect x="350" y="30" width="2" height="2" fill="#c8e8d8"/>
  <rect x="415" y="22" width="2" height="2" fill="#ffffff"/>
  <rect x="445" y="8"  width="2" height="2" fill="#ffe8b8"/>
  <rect x="490" y="28" width="2" height="2" fill="#d8b8ff"/>
  <rect x="510" y="10" width="2" height="2" fill="#ffffff" opacity="0.9"/>
  <rect x="570" y="24" width="2" height="2" fill="#b8d8ff"/>
  <rect x="600" y="8"  width="2" height="2" fill="#ffffff"/>
  <rect x="650" y="26" width="2" height="2" fill="#e8d8ff"/>
  <rect x="86"  y="32" width="2" height="2" fill="#ffffff" opacity="0.7"/>
  <rect x="170" y="12" width="2" height="2" fill="#ffd8c8" opacity="0.8"/>
  <rect x="310" y="34" width="2" height="2" fill="#c8d8ff"/>
  <rect x="560" y="32" width="2" height="2" fill="#ffffff" opacity="0.7"/>
  <rect x="56"  y="30" width="1" height="1" fill="#6050a0"/>
  <rect x="95"  y="14" width="1" height="1" fill="#8070b8"/>
  <rect x="220" y="24" width="1" height="1" fill="#7060a8"/>
  <rect x="260" y="16" width="1" height="1" fill="#6858a0"/>
  <rect x="336" y="22" width="1" height="1" fill="#8878c0"/>
  <rect x="396" y="30" width="1" height="1" fill="#7060a8"/>
  <rect x="430" y="18" width="1" height="1" fill="#6050a0"/>
  <rect x="478" y="22" width="1" height="1" fill="#8070b8"/>
  <rect x="525" y="30" width="1" height="1" fill="#7868b0"/>
  <rect x="586" y="16" width="1" height="1" fill="#6050a0"/>
  <rect x="665" y="18" width="1" height="1" fill="#8070b8"/>
  <rect x="644" y="4"  width="4" height="4"  fill="#f5e6c0"/>
  <rect x="640" y="8"  width="4" height="4"  fill="#f5e6c0"/>
  <rect x="644" y="8"  width="4" height="4"  fill="#ffe9b8"/>
  <rect x="640" y="12" width="4" height="4"  fill="#f5e6c0"/>
  <rect x="644" y="12" width="4" height="4"  fill="#ffe9b8"/>
  <rect x="644" y="16" width="4" height="4"  fill="#f5e6c0"/>
  <rect x="648" y="4"  width="4" height="4"  fill="#0d0a1a"/>
  <rect x="648" y="8"  width="4" height="4"  fill="#0d0a1a"/>
  <rect x="648" y="12" width="4" height="4"  fill="#0d0a1a"/>
  <rect x="648" y="16" width="4" height="4"  fill="#0d0a1a"/>
  <rect x="644" y="4"  width="4" height="4"  fill="#0d0a1a"/>
  <text x="20"  y="52" class="label">PROGRESSO</text>
  <text x="660" y="52" class="count" text-anchor="end">{total} / 100</text>
  <rect x="20" y="58" width="640" height="16" fill="#1a1030"/>
  <rect x="20" y="58" width="640" height="2"  fill="#2e1f52"/>
  <rect x="20" y="72" width="640" height="2"  fill="#2e1f52"/>
  <rect x="20" y="58" width="2"   height="16" fill="#2e1f52"/>
  <rect x="658" y="58" width="2"  height="16" fill="#2e1f52"/>
  <rect x="22" y="60" width="{f1}" height="12" fill="#5b21b6"/>
  <rect x="22" y="60" width="{f2}" height="12" fill="#6d28d9"/>
  <rect x="22" y="60" width="{f3}" height="12" fill="#7c3aed"/>
  <rect x="22" y="60" width="{f1}" height="3"  fill="#a78bfa" opacity="0.35"/>
  <rect x="{tip_x}" y="60" width="4" height="12" fill="#8b5cf6"/>
  <rect x="180" y="58" width="2" height="16" fill="#2e1f52"/>
  <rect x="340" y="58" width="2" height="16" fill="#2e1f52"/>
  <rect x="500" y="58" width="2" height="16" fill="#2e1f52"/>
  <text x="340" y="69" class="pct" text-anchor="middle">{total}%</text>
  <rect x="80"  y="54" width="2" height="2" fill="#b8ff78" opacity="0.7"/>
  <rect x="120" y="56" width="2" height="2" fill="#78ffcc" opacity="0.6"/>
  <rect x="60"  y="56" width="2" height="2" fill="#ffe478" opacity="0.5"/>
</svg>"""

          with open("progress.svg", "w", encoding="utf-8") as f:
              f.write(svg)
          print(f"✅ progress.svg pixel art: {total}/100")
          PYEOF

      - name: Atualizar badges no README
        env:
          TOTAL:  ${{ steps.count.outputs.total }}
          JAVA:   ${{ steps.count.outputs.java }}
          PYTHON: ${{ steps.count.outputs.python }}
        run: |
          python3 - << 'PYEOF'
          import re, os

          total  = os.environ["TOTAL"]
          java   = os.environ["JAVA"]
          python = os.environ["PYTHON"]

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_block = (
              "<!-- PROGRESS_START — não edite este bloco, o GitHub Actions atualiza automaticamente -->\n"
              "<div align=\"center\">\n\n"
              "![Progresso](./progress.svg)\n\n"
              f"![badge](https://img.shields.io/badge/Desafios%20Conclu%C3%ADdos-{total}%20%2F%20100-1d4ed8?style=for-the-badge&logo=checkmarx&logoColor=white)\n"
              "&nbsp;\n"
              f"![Java](https://img.shields.io/badge/Java-{java}%20arquivos-ED8B00?style=for-the-badge&logo=openjdk&logoColor=white)\n"
              "&nbsp;\n"
              f"![Python](https://img.shields.io/badge/Python-{python}%20arquivos-3776AB?style=for-the-badge&logo=python&logoColor=white)\n\n"
              "</div>\n"
              "<!-- PROGRESS_END -->"
          )

          updated = re.sub(
              r"<!-- PROGRESS_START.*?<!-- PROGRESS_END -->",
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)
          print(f"✅ README: {total}/100 (Java: {java}, Python: {python})")
          PYEOF

      - name: Commit das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md progress.svg
          git diff --staged --quiet || git commit -m "chore: atualiza progresso para ${{ steps.count.outputs.total }}/100 desafios [skip ci]"
          git push
