<svg xmlns="http://www.w3.org/2000/svg" width="640" height="80" viewBox="0 0 640 80">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <clipPath id="barClip">
      <rect x="16" y="38" width="608" height="22" rx="11"/>
    </clipPath>
  </defs>

  <!-- fundo -->
  <rect width="640" height="80" rx="12" fill="url(#bgGrad)"/>

  <!-- label esquerda -->
  <text x="16" y="28" font-family="'Courier New', monospace" font-size="12" fill="#94a3b8" letter-spacing="2">PROGRESSO</text>

  <!-- contador direita -->
  <text x="624" y="28" font-family="'Courier New', monospace" font-size="13" fill="#38bdf8" text-anchor="end" font-weight="bold">22 / 100</text>

  <!-- trilho da barra -->
  <rect x="16" y="38" width="608" height="22" rx="11" fill="#1e3a5f" opacity="0.8"/>

  <!-- barra preenchida (22%) -->
  <rect x="16" y="38" width="133" height="22" rx="11" fill="url(#barGrad)" clip-path="url(#barClip)"/>

  <!-- brilho na barra -->
  <rect x="16" y="38" width="133" height="10" rx="5" fill="white" opacity="0.12" clip-path="url(#barClip)"/>

  <!-- marcadores de 25%, 50%, 75% -->
  <line x1="168" y1="38" x2="168" y2="60" stroke="#0f172a" stroke-width="1.5" opacity="0.6"/>
  <line x1="320" y1="38" x2="320" y2="60" stroke="#0f172a" stroke-width="1.5" opacity="0.6"/>
  <line x1="472" y1="38" x2="472" y2="60" stroke="#0f172a" stroke-width="1.5" opacity="0.6"/>

  <!-- percentual dentro da barra -->
  <text x="320" y="53" font-family="'Courier New', monospace" font-size="11" fill="#cbd5e1" text-anchor="middle" font-weight="bold">22%</text>
</svg>
